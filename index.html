<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#315efb">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="ことば10">
  <title>ことば10 | 単語学習</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="icon" href="icon-192.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app" class="app-shell">
    <header class="topbar">
      <button class="icon-button" id="homeButton" aria-label="ホームへ戻る">語</button>
      <div>
        <h1>ことば10</h1>
        <p id="headerSubtitle">10問ずつ、少しずつ。</p>
      </div>
      <button class="icon-button ghost" id="settingsButton" aria-label="設定">⚙</button>
    </header>

    <main id="mainContent" tabindex="-1"></main>

    <nav class="bottom-nav" aria-label="メインメニュー">
      <button data-view="home" class="nav-item active"><span>⌂</span><small>ホーム</small></button>
      <button data-view="setup" class="nav-item"><span>▶</span><small>学習</small></button>
      <button data-view="mistakes" class="nav-item"><span>↻</span><small>誤答</small></button>
      <button data-view="history" class="nav-item"><span>▤</span><small>履歴</small></button>
    </nav>
  </div>

  <template id="toastTemplate">
    <div class="toast" role="status"></div>
  </template>

  <script src="words.js"></script>
  <script src="app.js?v=20260719-mobile2"></script>
</body>
</html>
