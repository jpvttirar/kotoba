<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ことば10 更新処理</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 640px;
      margin: 0 auto;
      padding: 32px 20px;
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <h1>ことば10を更新しています</h1>
  <p id="status">古いキャッシュを削除しています。学習履歴は削除しません。</p>

  <script>
    (async () => {
      const status = document.getElementById("status");

      try {
        if ("serviceWorker" in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map((registration) => registration.unregister()));
        }

        if ("caches" in window) {
          const cacheNames = await caches.keys();
          await Promise.all(
            cacheNames
              .filter((name) => name.startsWith("kotoba10-"))
              .map((name) => caches.delete(name))
          );
        }

        status.textContent = "更新準備が完了しました。アプリを開きます。";
        window.location.replace(`./?v=1.5.1&t=${Date.now()}`);
      } catch (error) {
        console.error(error);
        status.textContent =
          "自動更新に失敗しました。ブラウザーでページを再読み込みしてください。";
      }
    })();
  </script>
</body>
</html>
